services:
  ollama:
    image: ollama/ollama:latest
    container_name: ecoai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: ecoai-chromadb
    ports:
      - "8000:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ALLOW_RESET: "TRUE"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: ecoai-orchestrator
    depends_on:
      - ollama
      - chromadb
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      RAG_MODEL_ALIAS: ${RAG_MODEL_ALIAS}
      ORIGINAL_MODEL_ALIAS: ${ORIGINAL_MODEL_ALIAS}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: ${CHROMA_COLLECTION}
      DATASET_PATH: ${DATASET_PATH}
      TOP_K: ${TOP_K}
      MAX_HISTORY_MESSAGES: ${MAX_HISTORY_MESSAGES}
      MAX_CONTEXT_DISTANCE: ${MAX_CONTEXT_DISTANCE}
    volumes:
      - ./datasets:/workspace/datasets
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ecoai-open-webui
    depends_on:
      - orchestrator
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://orchestrator:8080
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
    volumes:
      - openwebui_data:/app/backend/data
    restart: unless-stopped

volumes:
  ollama_data:
  openwebui_data:
  chroma_data:
